# config/federated/default.yaml
# Phase 1 (FedAvg, no STN) hyperparameters for trainer_federated.py

num_clients: 8 # identity_dirichlet: exact client count. location: target granularity (effective count is derived from the data and reconciled).
num_rounds: 30
local_epochs: 1
fraction_fit: 1.0
fraction_evaluate: 1.0
min_fit_clients: 2
min_evaluate_clients: 2
min_available_clients: 8

algorithm: fedavg # fedavg | fedprox
proximal_mu: 0.01 # FedProx (Phase 2)

subspace: text_tower+heads # full | text_tower | vision_tower | heads_only | text_tower+heads | lora
custom_subspace_keys: null

partition:
  type: identity_dirichlet # identity_dirichlet | location | per_dataset (stub)
  alpha: 0.5 # (identity_dirichlet) smaller -> stronger non-IID
  min_samples: 0 # (location) sites with fewer samples fold into the shared `other` filler pool; 0 keeps all
  seed: ${seed}

stn: # Phase 2 - option (a). Model/data params live in the top-level `stn:` block;
  # here we only keep the FL-specific 2-stage round policy and mirror `enabled`.
  enabled: ${stn.enabled} # single source of truth = top-level config.stn.enabled
  two_stage:
    stage1_rounds: [0, 5] # STN trained, ReID weak/frozen
    stage2_rounds: [5, 30] # STN frozen, ReID fine-tuned

state_dir: ./fl_state

# GPU memory management: allocate the needed memory once at the start of the run and
# avoid new CUDA allocations (cudaMalloc / memory_reserved growth) during the rounds.
memory:
  cuda_alloc_conf: "expandable_segments:True" # PYTORCH_CUDA_ALLOC_CONF; set at process start, inherited by Ray workers. null -> leave unset
  cuda_memory_fraction: null # optional hard cap via torch.cuda.set_per_process_memory_fraction (0-1). null -> no cap
  empty_cache_on_eval: false # false keeps the reserved pool between rounds (no re-cudaMalloc). true = legacy behaviour
  reuse_model: true # build LitTBPS once per Ray worker process and reuse it across rounds/clients (no per-round rebuild/checkpoint reload)
  warmup: false # pre-reserve the peak at process start (1 throwaway train step + 1 eval, weights restored). Surfaces OOM at t=0
  log_gpu_memory: true # log reserved/allocated peaks per round to verify the footprint stays flat
  oom_retry: # on a shared GPU, wait-and-retry a client fit that hits CUDA OOM instead of failing the round
    enabled: true # false -> fail fast (server-side guard aborts on a fully-failed round)
    wait_seconds: 30 # pause between retries, giving co-tenant jobs time to release memory
    max_retries: null # null -> wait indefinitely until the allocation fits; int -> cap attempts then propagate

client_resources:
  num_gpus: 1.0 # mono-GPU -> clients run sequentially
  num_cpus: 4
